# LearnSync AI v1.0 - Redis Configuration
# Production-ready Redis settings

# ============================================
# NETWORK
# ============================================
bind 0.0.0.0
port 6379
protected-mode yes

# ============================================
# MEMORY MANAGEMENT
# ============================================
maxmemory 256mb
maxmemory-policy allkeys-lru

# ============================================
# PERSISTENCE (RDB)
# ============================================
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ============================================
# SECURITY
# ============================================
# requirepass your-redis-password

# ============================================
# PERFORMANCE
# ============================================
tcp-keepalive 300
timeout 0
tcp-backlog 511

# ============================================
# LOGGING
# ============================================
loglevel notice
logfile ""

# ============================================
# SLOW LOG
# ============================================
slowlog-log-slower-than 10000
slowlog-max-len 128

# ============================================
# CLIENT OUTPUT BUFFER LIMITS
# ============================================
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60