services:
  mongo:
    image: mongo:7.0
    container_name: learnsync-mongo-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - learnsync-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  learnsync-mongo-data:
